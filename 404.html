<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>La Bibliotheque Partagee</title>
    <script>
      (function () {
        var locales = ["fr", "en", "es"];
        var parts = location.pathname.split("/").filter(Boolean).filter(function (part) { return part !== "index.html"; });
        var localeIndex = parts.findIndex(function (part) { return locales.indexOf(part) !== -1; });
        var root = localeIndex === -1 ? "" : "../".repeat(parts.length - localeIndex);
        document.write("<link rel=\"stylesheet\" href=\"" + root + "assets/styles.css\">");
        document.write("<script defer src=\"" + root + "assets/app.js\"><\/script>");
      })();
    </script>
  </head>
  <body></body>
</html>
